{% extends "base.html" %}
{% block content %}
    <h1 class="my-4">Produtos</h1>
    <div class="mb-3 d-flex gap-2">
        <button class="btn btn-primary add-produtos" onclick="openModal('produto-modal')">Adicionar Produto</button>
    </div>
    <div class="table-responsive">
        <table class="table table-striped table-mobile-friendly">
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Descrição</th>
                    <th>Quantidade</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for produto in produtos %}
                    <tr>
                        <td data-label="Código">{{ produto.id }}</td>
                        <td data-label="Descrição">{{ produto.descricao }}</td>
                        <td data-label="Estoque">{{ produto.total }}</td>
                        <td data-label="Ações">
                                                        <button class="btn-edit" onclick="editProduto('{{ produto.id }}')" aria-label="Editar produto" title="Editar produto">
                                                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                                                                    <path d="M12.146.854a.5.5 0 0 1 .708 0l2.292 2.292a.5.5 0 0 1 0 .708l-9.793 9.793a.5.5 0 0 1-.168.11l-4 1.5a.5.5 0 0 1-.65-.65l1.5-4a.5.5 0 0 1 .11-.168L12.146.854zM11.207 2L3 10.207V13h2.793L14 4.793 11.207 2z"/>
                                                                </svg>
                                                        </button>
                                                        <button class="btn-delete" onclick="deleteProduto('{{ produto.id }}')" aria-label="Excluir produto" title="Excluir produto">
                                                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                                                                    <path d="M5.5 5.5A.5.5 0 0 1 6 5h4a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-.5.5H6a.5.5 0 0 1-.5-.5v-7z"/>
                                                                    <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 1 1 0-2h3.11a1 1 0 0 1 .89-.58h2.99a1 1 0 0 1 .89.58H14.5a1 1 0 0 1 1 1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118z"/>
                                                                </svg>
                                                        </button>
                                                        <button class="btn btn-info btn-sm" onclick="showDetails('{{ produto.id }}')" aria-label="Detalhes" title="Detalhes">
                                                            Detalhes
                                                        </button>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div id="produto-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('produto-modal')">×</span>
            <h2>Cadastrar Produto</h2>
            <form method="POST" class="row g-3">
                <div class="col-12"><input type="text" class="form-control" name="descricao" placeholder="Descrição" required></div>
                <div class="col-12"><button type="submit" class="btn btn-primary">Cadastrar</button></div>
            </form>
        </div>
    </div>

    <div id="edit-produto-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('edit-produto-modal')">×</span>
            <h2>Editar Produto</h2>
            <form method="POST" class="row g-3">
                <input type="hidden" id="edit-produto-id" name="id">
                <div class="col-12"><input type="text" class="form-control" id="edit-descricao" name="descricao" placeholder="Descrição" required></div>
                <div class="col-12"><button type="submit" class="btn btn-primary">Atualizar</button></div>
            </form>
        </div>
    </div>

    <div id="produto-detalhes-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header d-flex justify-content-between align-items-center">
            <h2>Detalhes de Estoque</h2>            
            <span class="close" onclick="closeModal('produto-detalhes-modal')">×</span>
            </div>
            <div id="detalhes-conteudo">
            </div>
            <div class="mt-3"><button class="btn btn-secondary" onclick="closeModal('produto-detalhes-modal')">Fechar</button></div>
        </div>
    </div>
{% endblock %}
