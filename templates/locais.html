{% extends "base.html" %}
{% block content %}
<h1 class="my-4">Locais de Estoque</h1>
<div class="mb-3 d-flex gap-2">
    <button class="btn btn-primary add-locais" onclick="openModal('local-modal')">Adicionar Local</button>
</div>
<div class="table-responsive">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Descrição</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for l in locais %}
            <tr>
                <td>{{ l.id }}</td>
                <td>{{ l.nome }}</td>
                <td>{{ l.descricao }}</td>
                <td>
                    <button class="btn-edit" onclick="editLocal('{{ l.id }}')" aria-label="Editar local"
                        title="Editar local">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-pencil" viewBox="0 0 16 16">
                            <path
                                d="M12.146.854a.5.5 0 0 1 .708 0l2.292 2.292a.5.5 0 0 1 0 .708l-9.793 9.793a.5.5 0 0 1-.168.11l-4 1.5a.5.5 0 0 1-.65-.65l1.5-4a.5.5 0 0 1 .11-.168L12.146.854zM11.207 2L3 10.207V13h2.793L14 4.793 11.207 2z" />
                        </svg>
                    </button>
                    <button class="btn-delete" onclick="deleteLocal('{{ l.id }}')" aria-label="Excluir local"
                        title="Excluir local">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-trash" viewBox="0 0 16 16">
                            <path
                                d="M5.5 5.5A.5.5 0 0 1 6 5h4a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-.5.5H6a.5.5 0 0 1-.5-.5v-7z" />
                            <path fill-rule="evenodd"
                                d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 1 1 0-2h3.11a1 1 0 0 1 .89-.58h2.99a1 1 0 0 1 .89.58H14.5a1 1 0 0 1 1 1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118z" />
                        </svg>
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div id="local-modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('local-modal')">×</span>
        <h2>Adicionar Local</h2>
        <form method="POST">
            <div class="mb-2"><input class="form-control" name="nome" placeholder="Nome" required></div>
            <div class="mb-2"><input class="form-control" name="descricao" placeholder="Descrição"></div>
            <div><button class="btn btn-primary">Salvar</button></div>
        </form>
    </div>
</div>

<div id="edit-local-modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('edit-local-modal')">×</span>
        <h2>Editar Local</h2>
        <form method="POST">
            <input type="hidden" id="edit-local-id" name="id">
            <div class="mb-2"><input class="form-control" id="edit-local-nome" name="nome" placeholder="Nome" required>
            </div>
            <div class="mb-2"><input class="form-control" id="edit-local-descricao" name="descricao"
                    placeholder="Descrição"></div>
            <div><button class="btn btn-primary">Atualizar</button></div>
        </form>
    </div>
</div>
{% endblock %}
